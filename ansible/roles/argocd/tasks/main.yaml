---
- name: Create argocd namespace
  shell: k3s kubectl create namespace argocd --dry-run=client -o yaml | k3s kubectl apply -f -

- name: Install ArgoCD
  shell: k3s kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side --force-conflicts

- name: Wait for ArgoCD server
  shell: k3s kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s

- name: Expose ArgoCD via NodePort
  shell: |
    k3s kubectl patch svc argocd-server -n argocd \
      -p '{"spec":{"type":"NodePort","ports":[{"port":80,"targetPort":8080,"nodePort":30080,"protocol":"TCP"}]}}'

- name: Get ArgoCD admin password
  shell: k3s kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
  register: argocd_pass

- name: Print ArgoCD password
  debug:
    msg: "ArgoCD UI: http://VM_IP:30080  login: admin  password: {{ argocd_pass.stdout }}"